<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="style.css" />

    <title>MyProject</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
      <div class="container-fluid">
        <a class="navbar-brand" href="./">Ini Logo</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" href="./index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">My Projects</a>
            </li>
          </ul>

          <a href="./contact.html">
            <button class="btn btn-dark">Contact Me</button>
          </a>
        </div>
      </div>
    </nav>

    <div class="contact-container">
      <form class="contact-card" id="projectForm">
        <h1 class="mb-4">Add a Project</h1>

        <!-- Project Name -->
        <div class="mb-3">
          <label for="Projectname" class="form-label fw-bold"
            >Project Name</label
          >
          <input type="text" class="form-control" id="Projectname" />
        </div>

        <!-- Date -->
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label fw-bold">Start Date</label>
            <input
              placeholder="yyyy-mm-dd"
              type="date"
              class="form-control"
              id="startDate"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label fw-bold">End Date</label>
            <input
              type="date"
              class="form-control"
              placeholder="yyyy-mm-dd"
              id="endDate"
            />
          </div>
        </div>

        <!-- Description -->
        <div class="mb-3">
          <label for="Description" class="form-label fw-bold"
            >Description</label
          >
          <textarea
            placeholder="Description"
            class="form-control"
            id="Description"
            rows="3"
          ></textarea>
        </div>

        <!-- Checkbox -->
        <div class="mb-3">
          <label for="technologies" class="form-label fw-bold"
            >Technologies Used</label
          >
          <div class="row mb-3">
            <div class="form-check col-md-6 mb-2">
              <input class="form-check-input" type="checkbox" id="tech1" />
              <label class="form-check-label" for="tech1">Node.js</label>
            </div>

            <div class="form-check col-md-6 mb-2">
              <input class="form-check-input" type="checkbox" id="tech2" />
              <label class="form-check-label" for="tech2">React.js</label>
            </div>

            <div class="form-check col-md-6 mb-2">
              <input class="form-check-input" type="checkbox" id="tech3" />
              <label class="form-check-label" for="tech3">Next.js</label>
            </div>

            <div class="form-check col-md-6 mb-2">
              <input class="form-check-input" type="checkbox" id="tech4" />
              <label class="form-check-label" for="tech4">TypeScript</label>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label for="formFile" class="form-label fw-bolder"
            >Upload Image</label
          >
          <input class="form-control" type="file" id="formFile" />
        </div>
        <button type="submit" class="btn btn-dark">Submit</button>
      </form>
    </div>
    <!-- card myproject -->
    <div class="container mt-5 mb-3">
      <h2 class="mb-2">My Projects</h2>

      <div class="input-group w-50 mt-2">
        <span class="input-group-text">
          <i class="bi bi-search"></i>
        </span>
        <input
          type="text"
          class="form-control"
          placeholder="Search project..."
          oninput="filterProjects(this.value)"
        />
      </div>
    </div>

    <div id="projectCards" class="row g-6"></div>
    <!-- Modal Detail Project -->
    <div class="modal fade" id="detailModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle"></h5>
            <button
              title="detailModal"
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body" id="modalBody"></div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Project</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="editIndex" />

            <div class="mb-3">
              <label class="form-label">Project Name</label>
              <input type="text" id="editProjectName" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea id="editDescription" class="form-control"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Start Date</label>
              <input type="date" id="editStartDate" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">End Date</label>
              <input type="date" id="editEndDate" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Technologies</label><br />
              <label
                ><input type="checkbox" id="editTech1" value="Node.js" />
                Node.js</label
              ><br />
              <label
                ><input type="checkbox" id="editTech2" value="React.js" />
                React.js</label
              ><br />
              <label
                ><input type="checkbox" id="editTech3" value="Next.js" />
                Next.js</label
              ><br />
              <label
                ><input type="checkbox" id="editTech4" value="TypeScript" />
                TypeScript</label
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Image (optional)</label>
              <input type="file" id="editImage" class="form-control" />
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button class="btn btn-success" onclick="saveEdit()">Save</button>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
  </body>
</html>
